<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Vyre Store — Netflix Link Generator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0d0d0d,#141414);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:700px;
background:#111;
border:1px solid #222;
border-radius:20px;
padding:30px;
box-shadow:0 0 30px rgba(0,0,0,.5);
}

.logo{
font-size:32px;
font-weight:700;
text-align:center;
margin-bottom:10px;
color:#fff;
}

.subtitle{
text-align:center;
color:#888;
margin-bottom:25px;
}

textarea{
width:100%;
height:180px;
background:#181818;
border:1px solid #333;
border-radius:12px;
padding:15px;
color:white;
font-size:14px;
resize:none;
outline:none;
}

.output{
margin-top:15px;
padding:15px;
background:#181818;
border-radius:12px;
word-break:break-all;
font-size:14px;
min-height:55px;
color:#00ff9d;
}

.buttons{
display:flex;
gap:12px;
margin-top:20px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

.generate{
background:#6d4aff;
color:white;
}

.open{
background:#00c16a;
color:white;
}

.copy{
background:#232323;
color:white;
}

button:hover{
transform:translateY(-2px);
opacity:.95;
}
</style>
</head>
<body>

<div class="container">
<div class="logo">Vyre Store</div>
<div class="subtitle">Netflix Link Generator</div>

<textarea
id="cookieInput"
placeholder="Paste Netflix cookies here..."
></textarea>

<div id="output" class="output">
Generated link will appear here...
</div>

<div class="buttons">
<button class="generate" onclick="generateLink()">Generate Link</button>
<button class="open" onclick="openLink()">Open Link</button>
<button class="copy" onclick="copyLink()">Copy Link</button>
</div>
</div>

<script>
let generatedUrl = "";

function generateLink() {
const input = document.getElementById("cookieInput").value.trim();

if (!input) {
document.getElementById("output").innerText =
"Paste cookie string first.";
return;
}

const match = input.match(/NetflixId=([^;]+)/);

if (!match) {
document.getElementById("output").innerText =
"NetflixId not found.";
return;
}

let decoded = decodeURIComponent(match[1]);

let tokenMatch = decoded.match(/ct=([^&]+)/);

if (!tokenMatch) {
document.getElementById("output").innerText =
"Could not extract token.";
return;
}

const token = tokenMatch[1];

generatedUrl =
"https://www.netflix.com/account?nftoken=" + token;

document.getElementById("output").innerText =
generatedUrl;
}

function openLink() {
if (!generatedUrl) return;
window.open(generatedUrl, "_blank");
}

function copyLink() {
if (!generatedUrl) return;

navigator.clipboard.writeText(generatedUrl);

document.getElementById("output").innerText =
"Copied:\n" + generatedUrl;
}
</script>

</body>
</html>
